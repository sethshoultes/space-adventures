version: '3.8'

services:
  # ==============================================================================
  # GATEWAY SERVICE - Port ${GATEWAY_PORT:-17010} (NCC-1701-0)
  # Single entry point for all backend services
  # ==============================================================================
  gateway:
    build:
      context: ./python/gateway
      dockerfile: Dockerfile
    container_name: space-adventures-gateway
    ports:
      - "${GATEWAY_PORT:-17010}:${GATEWAY_PORT:-17010}"
    environment:
      - AI_SERVICE_URL=http://ai-service:${AI_SERVICE_PORT:-17011}
      - WHISPER_SERVICE_URL=http://whisper-service:${WHISPER_SERVICE_PORT:-17012}
      - IMAGE_SERVICE_URL=http://image-service:${IMAGE_SERVICE_PORT:-17013}
      - HOST=0.0.0.0
      - PORT=${GATEWAY_PORT:-17010}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./python/gateway:/app
      - ./python/shared:/app/shared
    depends_on:
      ai-service:
        condition: service_healthy
    networks:
      - space-adventures-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${GATEWAY_PORT:-17010}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==============================================================================
  # AI SERVICE - Port ${AI_SERVICE_PORT:-17011} (NCC-1701-1)
  # AI-powered content generation (missions, dialogue, chat)
  # ==============================================================================
  ai-service:
    build:
      context: ./python/ai-service
      dockerfile: Dockerfile
    container_name: space-adventures-ai
    ports:
      - "${AI_SERVICE_PORT:-17011}:${AI_SERVICE_PORT:-17011}"
    environment:
      # AI Providers
      - AI_PROVIDER_STORY=${AI_PROVIDER_STORY:-ollama}
      - AI_PROVIDER_QUICK=${AI_PROVIDER_QUICK:-ollama}
      - AI_PROVIDER_RANDOM=${AI_PROVIDER_RANDOM:-ollama}

      # API Keys
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

      # Ollama Configuration
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}

      # Models
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-5-sonnet-20241022}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-3.5-turbo}

      # Redis Cache
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-17014}
      - REDIS_DB=0
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_TTL_HOURS=${CACHE_TTL_HOURS:-24}

      # AI Settings
      - TEMPERATURE=${TEMPERATURE:-0.8}
      - MAX_TOKENS=${MAX_TOKENS:-1500}

      # Server
      - HOST=0.0.0.0
      - PORT=${AI_SERVICE_PORT:-17011}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./python/ai-service:/app
      - ./python/shared:/app/shared
      - ai-cache:/app/.cache
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - space-adventures-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${AI_SERVICE_PORT:-17011}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==============================================================================
  # WHISPER SERVICE - Port ${WHISPER_SERVICE_PORT:-17012} (NCC-1701-2) (Optional)
  # Voice-to-text transcription service
  # ==============================================================================
  whisper-service:
    build:
      context: ./python/whisper-service
      dockerfile: Dockerfile
    container_name: space-adventures-whisper
    ports:
      - "${WHISPER_SERVICE_PORT:-17012}:${WHISPER_SERVICE_PORT:-17012}"
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - DEVICE=${DEVICE:-cpu}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-25}
      - SUPPORTED_FORMATS=${SUPPORTED_FORMATS:-wav,mp3,ogg,flac,m4a}
      - LANGUAGE=en
      - HOST=0.0.0.0
      - PORT=${WHISPER_SERVICE_PORT:-17012}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./python/whisper-service:/app
      - ./python/shared:/app/shared
      - whisper-temp:/tmp/whisper_uploads
    networks:
      - space-adventures-network
    restart: unless-stopped
    profiles:
      - voice  # Optional service - only start with: docker-compose --profile voice up
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WHISPER_SERVICE_PORT:-17012}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Longer startup for model loading

  # ==============================================================================
  # REDIS - Port ${REDIS_PORT:-17014} (NCC-1701-4)
  # Cache & Session Store - Used by AI service for response caching
  # ==============================================================================
  redis:
    image: redis:7-alpine
    container_name: space-adventures-redis
    ports:
      - "${REDIS_PORT:-17014}:6379"
    volumes:
      - redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - space-adventures-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ==============================================================================
  # REDIS COMMANDER - Port ${REDIS_COMMANDER_PORT:-17081} (NCC-1701-81) (Debug only)
  # Redis Web UI - Access at http://localhost:17081
  # ==============================================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: space-adventures-redis-ui
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "${REDIS_COMMANDER_PORT:-17081}:8081"
    depends_on:
      - redis
    networks:
      - space-adventures-network
    restart: unless-stopped
    profiles:
      - debug

# ==============================================================================
# NETWORKS
# ==============================================================================
networks:
  space-adventures-network:
    driver: bridge
    name: space-adventures-net

# ==============================================================================
# VOLUMES
# ==============================================================================
volumes:
  redis-data:
    driver: local
    name: space-adventures-redis-data
  ai-cache:
    driver: local
    name: space-adventures-ai-cache
  whisper-temp:
    driver: local
    name: space-adventures-whisper-temp
