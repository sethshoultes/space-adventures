version: '3.8'

# Staging Environment Configuration
# Production-like environment for final testing

services:
  ai-service:
    image: ghcr.io/${GITHUB_REPOSITORY}:staging-latest
    container_name: space-adventures-ai-staging
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=staging
      - AI_PROVIDER=${AI_PROVIDER}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CACHE_ENABLED=true
      - CACHE_TTL_SECONDS=86400
      - LOG_LEVEL=INFO
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=space_adventures_staging
      - POSTGRES_USER=staging_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - SENTRY_DSN=${SENTRY_DSN}
      - SENTRY_ENVIRONMENT=staging
    volumes:
      - ./generated_images:/app/generated_images
      - ai-cache-staging:/app/.cache
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - space-adventures-staging
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: space-adventures-postgres-staging
    environment:
      - POSTGRES_DB=space_adventures_staging
      - POSTGRES_USER=staging_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    volumes:
      - postgres-data-staging:/var/lib/postgresql/data
      - ./database/backups:/backups
    networks:
      - space-adventures-staging
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staging_user -d space_adventures_staging"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: space-adventures-redis-staging
    volumes:
      - redis-data-staging:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - space-adventures-staging
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: space-adventures-nginx-staging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - ai-service
    networks:
      - space-adventures-staging
    restart: always

  # Backup service
  backup:
    image: postgres:15-alpine
    container_name: space-adventures-backup-staging
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=space_adventures_staging
      - POSTGRES_USER=staging_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./database/backups:/backups
      - ./scripts/backup.sh:/backup.sh
    depends_on:
      - postgres
    networks:
      - space-adventures-staging
    entrypoint: /bin/sh -c "chmod +x /backup.sh && crond -f -l 2"

networks:
  space-adventures-staging:
    driver: bridge
    name: space-adventures-staging-net

volumes:
  postgres-data-staging:
    driver: local
    name: space-adventures-postgres-staging
  redis-data-staging:
    driver: local
    name: space-adventures-redis-staging
  ai-cache-staging:
    driver: local
    name: space-adventures-ai-cache-staging
